<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accident Emergency - LifeSaver AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="accident-theme">
  <!-- Top Header -->
  <header class="top-header">
    <a href="emergency.html" class="back-btn">←</a>
    <h1 class="header-title">Accident Emergency</h1>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    
    <!-- Step 1: Consciousness Check -->
    <div class="action-card dynamic-section active" id="step1">
      <h2 class="question-title">Is the person conscious?</h2>
      <p class="question-subtitle">Are they awake and able to respond to you?</p>
      
      <div class="btn-row">
        <button class="btn-large btn-green" onclick="handleConscious(true)">
          ✅ Yes
        </button>
        <button class="btn-large btn-red" onclick="handleConscious(false)">
          ❌ No
        </button>
      </div>
    </div>

    <!-- Step 2: Injury Type (If Conscious) -->
    <div class="action-card dynamic-section" id="step2">
      <h2 class="question-title">What is the primary injury?</h2>
      <p class="question-subtitle">Select the most severe issue.</p>
      
      <div class="options-col">
        <button class="btn-option" onclick="analyzeResult('bleeding')">
          🩸 Severe Bleeding
        </button>
        <button class="btn-option" onclick="analyzeResult('fracture')">
          🦴 Suspected Fracture
        </button>
        <button class="btn-option" onclick="analyzeResult('minor')">
          🤕 Minor Injury / Scrape
        </button>
      </div>
    </div>

    <!-- Result Container -->
    <div id="resultContainer" class="dynamic-section"></div>

  </main>

  <script>
    // Elements
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const resultContainer = document.getElementById('resultContainer');

    function hideAll() {
      step1.classList.remove('active');
      step2.classList.remove('active');
      resultContainer.classList.remove('active');
      resultContainer.innerHTML = '';
    }

    function handleConscious(isConscious) {
      hideAll();
      
      if (isConscious) {
        // Go to Step 2
        setTimeout(() => {
          step2.classList.add('active');
        }, 50);
      } else {
        // Unconscious -> Immediate Critical Result
        showAnalyzing('unconscious');
      }
    }

    function analyzeResult(type) {
      hideAll();
      showAnalyzing(type);
    }

    function showAnalyzing(type) {
      resultContainer.innerHTML = `
        <div class="result-card">
          <div class="analyzing-box">
            <div class="spinner"></div>
            <p>Analyzing situation...</p>
          </div>
        </div>
      `;
      resultContainer.classList.add('active');

      setTimeout(() => {
        renderResult(type);
      }, 1000);
    }

    function renderResult(type) {
      let content = '';

      if (type === 'unconscious') {
        content = `
          <div class="result-card res-danger">
            <div class="result-header">
              <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🚨</div>
              <h3 class="result-title">Critical Condition</h3>
              <p style="color: var(--text-muted);">Person is unconscious following an accident.</p>
            </div>
            
            <div class="emergency-call-box">
              <div class="call-text">
                <strong>Call Ambulance Immediately</strong>
                <span>Start CPR if not breathing</span>
              </div>
              <a href="tel:108" class="call-btn">📞 108</a>
            </div>

            <ul class="steps-list">
              <li><strong>Do not move them:</strong> Unless they are in immediate danger (e.g., fire). Moving them may worsen spinal injuries.</li>
              <li><strong>Check breathing:</strong> Listen for breath sounds. If not breathing, start CPR immediately.</li>
              <li><strong>Stop bleeding:</strong> If there is heavy bleeding, apply firm direct pressure using a clean cloth.</li>
              <li><strong>Stay with them:</strong> Keep them warm and wait for emergency services to arrive.</li>
            </ul>
          </div>
        `;
      } 
      else if (type === 'bleeding') {
        content = `
          <div class="result-card res-danger">
            <div class="result-header">
              <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🩸</div>
              <h3 class="result-title">Severe Bleeding</h3>
              <p style="color: var(--text-muted);">Immediate action required to prevent blood loss.</p>
            </div>

            <div class="emergency-call-box">
              <div class="call-text">
                <strong>Call Ambulance</strong>
                <span>Act immediately while calling</span>
              </div>
              <a href="tel:108" class="call-btn">📞 108</a>
            </div>

            <ul class="steps-list">
              <li><strong>Apply direct pressure:</strong> Use a clean cloth or bandage and press firmly directly on the wound.</li>
              <li><strong>Do not remove cloth:</strong> If blood soaks through, add more layers on top. Do not take the first one off.</li>
              <li><strong>Elevate:</strong> If it's on a limb, raise it above heart level to slow blood flow.</li>
              <li><strong>Keep them calm:</strong> Have the person lie down to prevent fainting and keep them warm.</li>
            </ul>
          </div>
        `;
      }
      else if (type === 'fracture') {
        content = `
          <div class="result-card res-warning">
            <div class="result-header">
              <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🦴</div>
              <h3 class="result-title">Suspected Fracture</h3>
              <p style="color: var(--text-muted);">Prevent further injury by immobilizing the area.</p>
            </div>

            <div class="emergency-call-box" style="background: rgba(243, 156, 18, 0.1); border-color: rgba(243, 156, 18, 0.3);">
              <div class="call-text">
                <strong style="color: #f5b041;">Seek Medical Help</strong>
                <span>Do not force movement</span>
              </div>
              <a href="tel:108" class="call-btn" style="background: var(--accent-orange);">📞 108</a>
            </div>

            <ul class="steps-list">
              <li><strong>Immobilize:</strong> Do not attempt to realign the bone or push a bone back in.</li>
              <li><strong>Support the injury:</strong> Use a splint or padding to keep the area completely still.</li>
              <li><strong>Apply cold pack:</strong> Wrap ice in a cloth and apply to reduce swelling. Do not apply ice directly to skin.</li>
              <li><strong>Treat bleeding:</strong> If there is bleeding, apply pressure around the bone, not directly on it.</li>
            </ul>
          </div>
        `;
      }
      else if (type === 'minor') {
        content = `
          <div class="result-card res-safe">
            <div class="result-header">
              <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🩹</div>
              <h3 class="result-title">Minor Injury</h3>
              <p style="color: var(--text-muted);">Basic first aid should be sufficient.</p>
            </div>

            <ul class="steps-list">
              <li><strong>Clean the wound:</strong> Wash with clean, running water for several minutes.</li>
              <li><strong>Apply light pressure:</strong> Use a sterile gauze to stop any minor bleeding.</li>
              <li><strong>Apply antibiotic ointment:</strong> Once clean and dry, apply ointment to prevent infection.</li>
              <li><strong>Cover it:</strong> Protect the area with a clean bandage or plaster.</li>
              <li><strong>Monitor:</strong> Watch for signs of infection (redness, swelling, heat) over the next few days.</li>
            </ul>
            
            <button class="btn-option" style="margin-top: 1.5rem;" onclick="location.reload()">
              🔄 Start Over
            </button>
          </div>
        `;
      }

      resultContainer.innerHTML = content;

      if (type === 'unconscious' || type === 'bleeding' || type === 'fracture') {
        findHospitals();
      }
    }

    function findHospitals() {
      const resultCard = resultContainer.querySelector('.result-card');
      if (!resultCard) return;

      const hospitalDiv = document.createElement('div');
      hospitalDiv.style.cssText = "margin-top: 1.5rem; padding: 1rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px;";
      hospitalDiv.innerHTML = `
        <div style="display: flex; align-items: center; gap: 0.75rem; color: var(--text-muted);">
          <div class="spinner" style="width: 20px; height: 20px; margin: 0; border-width: 2px;"></div>
          <strong>📍 Finding nearby hospitals...</strong>
        </div>
      `;
      resultCard.appendChild(hospitalDiv);

      if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            // Simulated distances for demo reliability
            const d1 = (Math.random() * 1.5 + 0.5).toFixed(1);
            const d2 = (Math.random() * 2.0 + 2.5).toFixed(1);
            const d3 = (Math.random() * 3.0 + 5.0).toFixed(1);

            hospitalDiv.innerHTML = `
              <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;">
                <span style="font-size:1.5rem">🏥</span>
                <div>
                  <strong style="color:var(--text-main, #fff); display:block;">Hospitals Near You</strong>
                  <span style="font-size:0.85rem; color:var(--text-muted, #94a3b8)">Location: ${lat.toFixed(4)}, ${lng.toFixed(4)}</span>
                </div>
              </div>
              
              <iframe 
                src="https://maps.google.com/maps?q=hospitals+near+${lat},${lng}&t=&z=13&ie=UTF8&iwloc=&output=embed" 
                width="100%" 
                height="200" 
                frameborder="0" 
                style="border:0; border-radius: 10px; margin-bottom: 1rem; filter: invert(90%) hue-rotate(180deg);" 
                allowfullscreen>
              </iframe>

              <!-- Suggested Hospitals List -->
              <div style="margin-bottom: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); border-radius: 8px; margin-bottom: 0.5rem;">
                  <div>
                    <strong style="color: #2ecc71; display: block; font-size: 0.95rem;">City General Hospital</strong>
                    <span style="color: #94a3b8; font-size: 0.8rem;">Open 24/7 • Emergency Unit</span>
                  </div>
                  <div style="text-align: right;">
                    <strong style="color: #fff;">${d1} km</strong>
                    <span style="display: block; color: #2ecc71; font-size: 0.75rem;">Nearest</span>
                  </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; margin-bottom: 0.5rem;">
                  <div>
                    <strong style="color: #fff; display: block; font-size: 0.95rem;">Metro Care Center</strong>
                    <span style="color: #94a3b8; font-size: 0.8rem;">Trauma & Burn Center</span>
                  </div>
                  <div style="text-align: right;">
                    <strong style="color: #fff;">${d2} km</strong>
                  </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;">
                  <div>
                    <strong style="color: #fff; display: block; font-size: 0.95rem;">Lifeline Medical Group</strong>
                    <span style="color: #94a3b8; font-size: 0.8rem;">General Hospital</span>
                  </div>
                  <div style="text-align: right;">
                    <strong style="color: #fff;">${d3} km</strong>
                  </div>
                </div>
              </div>

              <a href="https://www.google.com/maps/search/hospitals+near+${lat},${lng}" target="_blank" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.9rem; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.4); border-radius: 10px; color: #60a5fa; text-decoration: none; font-weight: 600; transition: background 0.2s;" onmouseover="this.style.background='rgba(59, 130, 246, 0.25)'" onmouseout="this.style.background='rgba(59, 130, 246, 0.15)'">
                🗺️ Open in Google Maps
              </a>
            `;
          },
          function(error) {
            hospitalDiv.innerHTML = `
              <div style="display: flex; align-items: center; gap: 0.75rem; color: var(--accent-red);">
                <span style="font-size:1.5rem">⚠️</span>
                <strong>Please enable location to find nearby hospitals</strong>
              </div>
            `;
          },
          { timeout: 10000 }
        );
      } else {
        hospitalDiv.innerHTML = `
          <div style="display: flex; align-items: center; gap: 0.75rem; color: var(--accent-red);">
            <span style="font-size:1.5rem">⚠️</span>
            <strong>Location not supported by browser</strong>
          </div>
        `;
      }
    }
  </script>
</body>

</html>
